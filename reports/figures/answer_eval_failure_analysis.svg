<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">Answer evaluation artifact</title>
  <desc id="desc">Answer quality evaluation summary and failed examples.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="1040" fill="url(#bg)"/>
  <rect x="150" y="52" width="1100" height="930" rx="28" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="190" y="116" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Answer Quality Evaluation</text>
  <text x="190" y="190" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Summary</text>
  <text x="210" y="232" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="20">Questions: 18</text>
  <text x="210" y="266" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="20">Faithfulness mean: 0.9821</text>
  <text x="210" y="300" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="20">Completeness mean: 2.8571</text>
  <text x="210" y="334" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="20">Citation usefulness mean: 2.9444</text>
  <text x="210" y="368" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="20">Correct refusal rate: 1.0</text>
  <text x="190" y="448" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Failure Modes</text>
  <rect x="190" y="478" width="190" height="42" rx="21" fill="#fef3c7"/>
  <text x="212" y="506" fill="#92400e" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">incomplete_answer: 1</text>
  <rect x="395" y="478" width="175" height="42" rx="21" fill="#fee2e2"/>
  <text x="418" y="506" fill="#991b1b" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">low_faithfulness: 1</text>
  <text x="190" y="590" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Failed Examples</text>
  <rect x="190" y="624" width="1020" height="150" rx="20" fill="#f8fafc" stroke="#d7e0ef"/>
  <text x="214" y="670" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">How can a student cancel registration before the semester begins without being charged?</text>
  <text x="214" y="708" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">Faithfulness: 0.75  |  Completeness: 3  |  Expected docs: unl_add_drop_withdraw, unl_academic_calendar</text>
  <text x="214" y="742" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="18">The answer was actionable, but it slightly over-asserted consequences that were broader than the cited text.</text>
  <rect x="190" y="800" width="1020" height="150" rx="20" fill="#f8fafc" stroke="#d7e0ef"/>
  <text x="214" y="846" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">On what basis can scholarships be awarded at Nebraska?</text>
  <text x="214" y="884" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">Faithfulness: 1.0  |  Completeness: 1  |  Expected docs: unl_scholarships</text>
  <text x="214" y="918" fill="#1f2937" font-family="Segoe UI, Arial, sans-serif" font-size="18">The answer stayed grounded but drifted into extra scholarship details instead of staying tight to the requested basis.</text>
</svg>
